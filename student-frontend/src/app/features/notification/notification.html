<div class="min-h-screen bg-gradient-to-br from-slate-100 via-gray-50 to-white p-8">

  <div class="max-w-5xl mx-auto space-y-10">

    <!-- HEADER CARD -->
    <div class="glass-card animate-fade-in-up">

      <h2 class="text-2xl font-bold mb-6
                 bg-gradient-to-r from-blue-600 to-purple-600
                 bg-clip-text text-transparent">
        🔔 Student Notifications
      </h2>

      <div class="flex flex-wrap gap-4 items-center">

        <input type="number"
               [(ngModel)]="rollNumber"
               placeholder="Enter Roll Number"
               class="input-field w-64">

        <button (click)="loadNotifications()"
                class="pro-btn glow-blue">
          Load Notifications
        </button>

      </div>

    </div>

    <!-- NOTIFICATION LIST -->
    <div class="glass-card animate-fade-in-up delay-100">

      <h3 class="section-title">Notification Records</h3>

      <div *ngIf="notificationList?.length; else noNotifications"
           class="max-h-96 overflow-y-auto pr-2 custom-scroll">

        <div *ngFor="let note of notificationList"
             class="bg-white rounded-2xl shadow-md p-5 mb-4
                    hover:scale-[1.02] transition-all duration-300">

          <!-- Timestamp -->
          <div class="text-xs text-gray-500 mb-2">
            {{ note.timestamp }}
          </div>

          <!-- Message -->
          <div class="font-medium text-gray-800 mb-4">
            {{ note.message }}
          </div>

          <!-- Update Section -->
          <div class="flex flex-wrap gap-3 items-center">

            <input #newMsg
                   type="text"
                   placeholder="Update message"
                   class="input-field flex-1 min-w-[200px] py-2">

            <button (click)="updateNotification(note.id, newMsg.value)"
                    class="mini-btn blue">
              Update
            </button>

            <button (click)="deleteNotification(note.id)"
                    class="mini-btn red">
              Delete
            </button>

          </div>

        </div>

      </div>

      <ng-template #noNotifications>
        <p class="text-gray-400 text-sm">
          No notifications available.
        </p>
      </ng-template>

    </div>

  </div>

</div>
