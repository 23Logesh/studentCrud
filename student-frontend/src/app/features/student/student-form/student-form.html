<!-- BACKDROP -->
<div class="fixed inset-0 flex items-center justify-center z-50">

  <!-- DARK OVERLAY -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-md"
       (click)="close()"></div>

  <!-- GLOW EFFECT -->
  <div class="absolute w-[500px] h-[500px]
              bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500
              opacity-20 blur-3xl animate-pulse">
  </div>

  <!-- MODAL -->
  <div
    class="relative w-full max-w-lg mx-4
           bg-white/80 backdrop-blur-2xl
           border border-white/30
           rounded-3xl shadow-2xl
           p-10
           transform transition-all duration-500
           animate-fade-in-up scale-100">

    <!-- CLOSE BUTTON -->
    <button
      (click)="close()"
      class="absolute top-4 right-4 text-gray-500
             hover:text-red-500 hover:rotate-90
             transition duration-300 text-xl">
      ✕
    </button>

    <!-- HEADER -->
    <h3 class="text-3xl font-extrabold mb-8
               bg-gradient-to-r from-blue-600 via-purple-600 to-pink-500
               bg-clip-text text-transparent">
      {{ isEditMode ? 'Edit Student' : 'Add Student' }}
    </h3>

    <form [formGroup]="studentForm"
          (ngSubmit)="onSubmit()"
          class="space-y-6">

      <!-- NAME -->
      <div>
        <label class="block mb-2 text-sm font-semibold text-gray-600">
          Name
        </label>

        <input
          type="text"
          formControlName="name"
          class="w-full px-4 py-3 rounded-2xl
                 bg-white/60 border border-gray-200
                 focus:ring-4 focus:ring-blue-300
                 focus:scale-[1.02]
                 focus:outline-none
                 transition-all duration-300 shadow-sm" />

        <p *ngIf="studentForm.get('name')?.touched && studentForm.get('name')?.invalid"
           class="text-red-500 text-xs mt-2">
          Name is required
        </p>
      </div>

      <!-- EMAIL -->
      <div>
        <label class="block mb-2 text-sm font-semibold text-gray-600">
          Email
        </label>

        <input
          type="email"
          formControlName="email"
          class="w-full px-4 py-3 rounded-2xl
                 bg-white/60 border border-gray-200
                 focus:ring-4 focus:ring-purple-300
                 focus:scale-[1.02]
                 focus:outline-none
                 transition-all duration-300 shadow-sm" />

        <p *ngIf="studentForm.get('email')?.touched && studentForm.get('email')?.invalid"
           class="text-red-500 text-xs mt-2">
          Valid email is required
        </p>
      </div>

      <!-- CLASS -->
      <div>
        <label class="block mb-2 text-sm font-semibold text-gray-600">
          Class
        </label>

        <input
          type="text"
          formControlName="className"
          class="w-full px-4 py-3 rounded-2xl
                 bg-white/60 border border-gray-200
                 focus:ring-4 focus:ring-pink-300
                 focus:scale-[1.02]
                 focus:outline-none
                 transition-all duration-300 shadow-sm" />

        <p *ngIf="studentForm.get('className')?.touched && studentForm.get('className')?.invalid"
           class="text-red-500 text-xs mt-2">
          Class is required
        </p>
      </div>

      <!-- BUTTONS -->
      <div class="flex justify-end gap-4 pt-6">

        <button
          type="button"
          (click)="close()"
          class="px-6 py-2 rounded-2xl
                 bg-gray-200 hover:bg-gray-300
                 hover:scale-105
                 transition-all duration-300 font-medium">
          Cancel
        </button>

        <button
          type="submit"
          [disabled]="studentForm.invalid"
          class="px-8 py-2 rounded-2xl
                 text-white font-semibold
                 bg-gradient-to-r from-blue-600 to-purple-600
                 shadow-lg
                 hover:shadow-xl hover:scale-110
                 disabled:opacity-40 disabled:cursor-not-allowed
                 transition-all duration-300">
          {{ isEditMode ? 'Update' : 'Save' }}
        </button>

      </div>

    </form>

  </div>
</div>
